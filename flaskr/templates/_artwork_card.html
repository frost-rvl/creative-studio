<div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-200">
    <a href="{{ url_for('main.serve_uploaded_file', filename=artwork.file_path) }}" target="_blank">
        <img src="{{ url_for('main.serve_uploaded_file', filename=artwork.file_path) }}" 
             alt="{{ artwork.title }}" 
             class="w-full h-48 object-cover">
    </a>
    
    <div class="p-4">
        <div class="flex items-start justify-between mb-2">
            <div class="flex-1">
                <h3 class="font-semibold text-gray-800 truncate">{{ artwork.title }}</h3>
                <p class="text-xs text-gray-500">by {{ artwork.author.username }}</p>
            </div>
        </div>
        <p class="text-sm text-gray-500 truncate">{{ artwork.desc or 'No description' }}</p>
        <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-200">
            <span class="text-xs text-gray-400">{{ artwork.timestamp.strftime('%b %d, %Y') }}</span>
            <a href="{{ url_for('profile.user', username=artwork.author.username) }}" 
               class="text-xs text-red-500 hover:text-red-600">View profile</a>
        </div>
    </div>
</div>
