{% extends "base.html" %}

{% block content %}
    <main class="w-full px-6 md:px-16 lg:px-24 xl:px-32">
        <div class="mt-8 max-w-7xl mx-auto shadow-xl rounded-lg text-gray-900 pb-8">
            <div class="rounded-t-lg h-72 overflow-hidden bg-gray-300">
                <img class="object-cover object-center w-full" src='{{ user.cover }}' alt=''>
            </div>
            <div class="px-16 relative -mt-24 flex flex-row gap-8 items-center w-full">
                <div class="w-64 h-64 border-4 border-gray-100 rounded-full overflow-hidden">
                    <img class="object-cover object-center h-64 w-full" src='{{ user.avatar }}' alt='{{ user.username }}'>
                </div>
                <div>
                    <h2 class="font-semibold text-3xl">{{ user.username }}</h2>
                </div>
                {% if user == current_user %}
                    <button class="hover:bg-slate-50 transition px-6 py-2 border border-red-600 rounded-md ml-auto" onclick="window.location.href = `{{ url_for('profile.edit_profile') }}`; ">Edit profile</button>
                {% endif %}
            </div>
            <div class="ml-20 mt-8">
                <p class="text-gray-500 {% if not user.about_me %} invisible {% endif %}">{{ user.about_me }}</p>
            </div>
        </div>
    </main>
{% endblock %}
