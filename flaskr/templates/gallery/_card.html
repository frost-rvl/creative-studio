<div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-200">
    <a href="{{ url_for('main.serve_uploaded_file', filename=artwork.file_path) }}" target="_blank">
        <img src="{{ url_for('main.serve_uploaded_file', filename=artwork.file_path) }}" 
             alt="{{ artwork.title }}" 
             class="w-full h-48 object-cover">
    </a>
    
    <div class="p-4">
        <h3 class="font-semibold text-gray-800 truncate">{{ artwork.title }}</h3>
        <p class="text-sm text-gray-500 truncate">{{ artwork.desc or 'No description' }}</p>
        
        <div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-200">
            <div class="flex gap-2">
                <form action="{{ url_for('gallery.toggle_visibility', artwork_id=artwork.id) }}" method="post" class="inline">
                    <button type="submit" class="p-1.5 bg-gray-100 hover:bg-red-500 text-gray-600 hover:text-white rounded transition-all duration-200 active:scale-90" title="Toggle visibility">
                        {% if artwork.is_public %}
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        {% else %}
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                        {% endif %}
                    </button>
                </form>
                
                <form action="{{ url_for('gallery.delete_artwork', artwork_id=artwork.id) }}" method="post" class="inline" onsubmit="return confirm('Delete this artwork?');">
                    <button type="submit" class="p-1.5 bg-gray-100 hover:bg-red-600 text-gray-600 hover:text-white rounded transition-all duration-200 active:scale-90" title="Delete artwork">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </form>
            </div>
            
            {% if artwork.is_public %}
            <span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full">Public</span>
            {% else %}
            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full">Private</span>
            {% endif %}
        </div>
    </div>
</div>
