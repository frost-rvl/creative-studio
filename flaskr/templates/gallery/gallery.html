{% extends "base.html" %}
{% block content %}
<main class="w-full max-w-7xl md:px-16 lg:px-0 mt-16">
    <div class="w-full flex flex-col">
        <div class="flex flex-1 overflow-hidden gap-4 border-gray-200 border rounded-lg p-6">
            <div class="flex-1">
                <!-- Header with filter -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">My Gallery</h2>
                    <div class="flex items-center gap-3">
                        <label for="typeFilter" class="text-sm font-medium text-gray-600">Filter by type:</label>
                        <select id="typeFilter" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500">
                            <option value="">All</option>
                            {% for t in user_types %}
                                <option value="{{ t.name }}" {% if t.name == current_filter %}selected{% endif %}>
                                    {{ t.name | title }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Artwork grid -->
                {% if artworks %}
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {% for artwork in artworks %}
                            {% include "gallery/_card.html" %}
                        {% endfor %}
                    </div>
                {% else %}
                    <div class="text-center py-12">
                        <p class="text-gray-500">No artworks found.</p>
                        {% if current_filter %}
                            <p class="text-sm text-gray-400">Try clearing the filter.</p>
                        {% endif %}
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</main>
<script type="module" src="{{ url_for('static', filename='js/gallery.js') }}"></script>
{% endblock %}
